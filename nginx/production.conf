# ======================================================
# Nginx Configuration — PHD Trans (busparwis.my.id)
# Deploy ke: /etc/nginx/sites-available/busparwis
# Aktifkan: ln -s /etc/nginx/sites-available/busparwis /etc/nginx/sites-enabled/
# ======================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name busparwis.my.id www.busparwis.my.id;

    # Let's Encrypt challenge (sementara sebelum SSL aktif)
    location /.well-known/acme-challenge/ {
        root /var/www/busparwis/src/public;
    }

    # Redirect semua request lain ke HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS Server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_tokens off;

    server_name busparwis.my.id www.busparwis.my.id;

    # Document root — Laravel public directory (di dalam folder src/)
    root /var/www/busparwis/src/public;

    index index.php index.html;

    # Maksimum ukuran upload (untuk upload video & bukti transfer)
    client_max_body_size 150M;

    # ============ SSL (Let's Encrypt) ============
    ssl_certificate     /etc/letsencrypt/live/busparwis.my.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/busparwis.my.id/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HTTP Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ============ Laravel Routes ============
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ============ PHP Processing ============
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        # Jika PHP 8.2: unix:/var/run/php/php8.2-fpm.sock
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # Timeouts
        fastcgi_read_timeout 120;
        fastcgi_send_timeout 120;
    }

    # ============ Deny Sensitive Files ============
    location ~ /\.ht {
        deny all;
    }

    location ~ /\.env {
        deny all;
    }

    location ~ /\.git {
        deny all;
    }

    location ~ /storage/ {
        try_files $uri =404;
    }

    # ============ Static Assets Caching ============
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ============ Logs ============
    access_log /var/log/nginx/busparwis-access.log;
    error_log  /var/log/nginx/busparwis-error.log;
}
